name: llm-wiki

services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://llm-wiki.hebler-betreuung.de}"
        WIKI_CONTENT_PATH: "${WIKI_CONTENT_PATH:-/app/content}"
    container_name: llm_wiki_frontend
    environment:
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://llm-wiki.hebler-betreuung.de}"
      WIKI_CONTENT_PATH: "${WIKI_CONTENT_PATH:-/app/content}"
      PORT: 3000
    volumes:
      # Mount the content repository root containing index.md, wiki/ and raw/
      - "${HOST_CONTENT_PATH:-/opt/llm-wiki-public}:/app/content:ro"
    restart: unless-stopped
    networks:
      - remote-proxy-network
      - local-dev-network

networks:
  remote-proxy-network:
    external: true
  local-dev-network:
    external: true
